# =============================================================================
#  Assignment 2 - configuration
#
#  Every value can be overridden WITHOUT editing this file, using either:
#    * a JVM system property  : -Dstar.rating=3
#    * an environment variable: STAR_RATING=3   (dots -> underscores, upper-case)
#
#  Resolution order (highest first): system property > environment variable > this file
# =============================================================================

# ---- Browser / driver -------------------------------------------------------
# Supported: chrome | firefox | edge
browser=chrome
# Run without a visible browser window (useful for CI)
headless=false

# ---- Run against a COPY of your WalletHub-signed-in Chrome profile -----------
# Submitting a review needs to be logged in as the light test account you created.
# Point this at a COPY of your signed-in profile (Chrome 136+ won't automate the
# live one). Populate it once, with Chrome quit (<PROFILE> from chrome://version
# -> "Profile Path", e.g. Default):
#   rm -rf /tmp/wallethub-profile && mkdir -p /tmp/wallethub-profile
#   cp -R "$HOME/Library/Application Support/Google/Chrome/<PROFILE>" /tmp/wallethub-profile/Default
#   cp  "$HOME/Library/Application Support/Google/Chrome/Local State" /tmp/wallethub-profile/
# Blank => launch a fresh browser (you would then be prompted to log in).
chrome.user.data.dir=/tmp/wallethub-profile
chrome.profile.directory=Default

# ---- Timeouts (seconds) -----------------------------------------------------
explicit.wait.timeout=20
page.load.timeout=45

# ---- Application under test / test data -------------------------------------
# The institution profile to review.
review.target.url=https://wallethub.com/profile/13732055i
# Your own profile, checked at the end of the flow.
profile.url=https://wallethub.com/profile/
# Where the site lands after a successful submit.
confirmation.url=https://wallethub.com/confirm-review

# Which star to rate with (1-5) and which policy/category to select.
star.rating=4
policy=Health Insurance
# Minimum length of the randomly generated review text (assignment requires 200+).
review.min.length=200
