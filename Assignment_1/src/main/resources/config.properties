# =============================================================================
#  Assignment 1 - configuration
#
#  Every value can be overridden WITHOUT editing this file, using either:
#    * a JVM system property  : -Dfb.username=me@example.com
#    * an environment variable: FB_USERNAME=me@example.com  (dots -> underscores, upper-case)
#
#  Resolution order (highest first): system property > environment variable > this file
# =============================================================================

# ---- Browser / driver -------------------------------------------------------
# Supported: chrome | firefox | edge
browser=chrome
# Run without a visible browser window (useful for CI)
headless=false

# ---- Use your real logged-in Chrome (avoids the bot/CAPTCHA of a fresh one) --
# Blank => launch a normal (fresh) browser.
# To reuse your existing signed-in session instead, start Chrome with a debug
# port (see scripts/launch-chrome-debug.sh), sign in by hand, then set this to
# host:port so the test ATTACHES to that browser rather than opening its own:
#   mvn test -Dchrome.debugger.address=127.0.0.1:9222
chrome.debugger.address=

# ---- Timeouts (seconds) -----------------------------------------------------
explicit.wait.timeout=15
page.load.timeout=30

# ---- Application under test -------------------------------------------------
base.url=https://www.facebook.com

# ---- Credentials (EDIT THESE, then run `mvn test`) --------------------------
# Put a Facebook test account here. To run without editing this file, override:
#   mvn test -Dfb.username=me@example.com -Dfb.password=secret
# This repo is public - prefer a throwaway test account (or pass -D) over
# committing real credentials.
fb.username=your_email_or_phone@example.com
fb.password=your_password_here

# ---- Test data --------------------------------------------------------------
fb.status.message=Hello World
