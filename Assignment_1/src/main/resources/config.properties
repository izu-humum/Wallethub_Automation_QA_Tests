# =============================================================================
#  Assignment 1 - configuration
#
#  Every value below can be overridden WITHOUT editing this file, using either:
#    * a JVM system property : -Dfb.username=me@example.com
#    * an environment variable: FB_USERNAME=me@example.com   (dots -> underscores, upper-case)
#
#  Resolution order (highest priority first):
#    system property  >  environment variable  >  this file
# =============================================================================

# ---- Browser / driver -------------------------------------------------------
# Supported: chrome | firefox | edge
browser=chrome
# Run without a visible browser window (useful for CI)
headless=false

# ---- Chrome profile ---------------------------------------------------------
# Drive a PERSISTENT Chrome profile (not a throwaway one) so cookies / the
# signed-in session carry over between runs and the browser is not treated as a
# brand-new (incognito-like) session - which greatly reduces CAPTCHA / bot checks.
chrome.use.existing.profile=true
#
# Chrome 136+ refuses to automate your DEFAULT profile (the browser just exits),
# so a dedicated directory is used. Blank => ~/.wallethub-selenium/chrome-profile
# (Chrome creates it on first run). Do NOT point this at your live default
# profile - it will be rejected with a clear error.
#
# To reuse your REAL logged-in session (best CAPTCHA avoidance), copy your
# profile into the dedicated directory ONCE, with Chrome fully closed, e.g. macOS:
#   mkdir -p ~/.wallethub-selenium
#   cp -R "$HOME/Library/Application Support/Google/Chrome" ~/.wallethub-selenium/chrome-profile
chrome.user.data.dir=
# Which profile inside the user-data directory (Default, "Profile 1", ...).
chrome.profile.directory=Default

# ---- Timeouts (seconds) -----------------------------------------------------
explicit.wait.timeout=15
page.load.timeout=30
# Short wait for optional / branching checks (cookie banner, already-logged-in)
optional.wait.timeout=5

# ---- Application under test -------------------------------------------------
base.url=https://www.facebook.com

# ---- Credentials ------------------------------------------------------------
# NOTE: placeholders only - do NOT commit real credentials.
# Override at run time, e.g.:
#   mvn test -Dfb.username=me@example.com -Dfb.password=secret
fb.username=your_email_or_phone@example.com
fb.password=your_password_here

# ---- Test data --------------------------------------------------------------
fb.status.message=Hello World
